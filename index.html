<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phantasm Role - Редактор</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background: #0a0a0a;
      color: #ddd;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }
    .sidebar {
      width: 280px;
      background: #111;
      border-right: 1px solid #333;
      padding: 20px 0;
      overflow-y: auto;
    }
    .main {
      flex: 1;
      padding: 30px;
      overflow-y: auto;
      background: #0a0a0a;
    }
    .section {
      padding: 12px 20px;
      cursor: pointer;
      border-radius: 6px;
      margin: 4px 10px;
    }
    .section:hover {
      background: #1f1f2e;
    }
    .section.active {
      background: #6b1b6b;
      color: white;
    }
    h1 { margin: 0 0 30px 0; color: #fff; }
    .card {
      background: #1e1e2e;
      padding: 16px;
      border-radius: 10px;
      margin-bottom: 12px;
      border: 1px solid #444;
    }
    button {
      padding: 10px 16px;
      background: #6b1b6b;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .hidden { display: none; }
  </style>
</head>
<body>

  <!-- Левая боковая панель -->
  <div class="sidebar">
    <h1 style="padding: 0 20px;">Phantasm Role</h1>
    
    <div class="section active" onclick="showSection(0)">📖 Общий сюжет</div>
    <div class="section" onclick="showSection(1)">👤 Персонажи</div>
    <div class="section" onclick="showSection(2)">📅 События</div>
  </div>

  <!-- Основная область -->
  <div class="main" id="mainContent">
    <!-- Сюда будет подгружаться контент -->
  </div>

  <script>
    const sections = [
      // 0 - Общий сюжет
      `<h2>Общий сюжет</h2>
       <div class="card">
         <textarea placeholder="Краткое описание всего сюжета..." style="width:100%; height:150px; background:#2a2a3a; color:#fff; border:1px solid #555; border-radius:8px; padding:10px;"></textarea>
       </div>`,

      // 1 - Персонажи
      `<h2>Персонажи</h2>
       <div id="characters-list"></div>
       <button onclick="addCharacter()">+ Добавить персонажа</button>`,

      // 2 - События
      `<h2>События</h2>
       <p>Здесь будет список событий</p>`
    ];

    function showSection(index) {
      document.getElementById('mainContent').innerHTML = sections[index];
      
      // Подсветка активного раздела
      document.querySelectorAll('.section').forEach((el, i) => {
        el.classList.toggle('active', i === index);
      });

      if (index === 1) renderCharacters();
    }

    let characters = [];

    function addCharacter() {
      const name = prompt("Имя персонажа:");
      if (name) {
        characters.push({ name, description: "" });
        renderCharacters();
      }
    }

    function renderCharacters() {
      const list = document.getElementById('characters-list');
      if (!list) return;
      
      list.innerHTML = characters.map((char, i) => `
        <div class="card" onclick="editCharacter(${i})">
          <strong>${char.name}</strong>
        </div>
      `).join('');
    }

    function editCharacter(index) {
      const char = characters[index];
      const desc = prompt("Описание персонажа:", char.description);
      if (desc !== null) {
        char.description = desc;
      }
    }

    // Начальная загрузка
    window.onload = () => {
      showSection(0); // открываем "Общий сюжет" по умолчанию
    };
  </script>
</body>
</html>
