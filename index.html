<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phantasm Role - Редактор сюжета</title>
  <script src="https://cdn.jsdelivr.net/npm/leader-line@1.0.7/leader-line.min.js"></script>
  <style>
    body { margin: 0; font-family: system-ui; background: #0a0a0a; color: #fff; overflow: hidden; }
    #toolbar { 
      padding: 15px; 
      background: #1a1a2e; 
      display: flex; 
      gap: 10px; 
      flex-wrap: wrap; 
      align-items: center;
      border-bottom: 1px solid #333;
      position: relative;
      z-index: 100;
    }
    button { 
      padding: 10px 16px; 
      background: #6b1b6b; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 14px;
    }
    button:hover { background: #8b2b8b; }
    .node { 
      position: absolute; 
      width: 200px; 
      padding: 12px; 
      background: #1e1e2e; 
      border: 2px solid #c026d3; 
      border-radius: 8px; 
      cursor: move; 
      user-select: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }
    .node textarea, .node input {
      width: 100%;
      background: #2a2a3a;
      border: 1px solid #555;
      color: #fff;
      margin-top: 8px;
      border-radius: 4px;
      padding: 6px;
    }
    .canvas { 
      position: relative; 
      width: 100vw; 
      height: calc(100vh - 60px); 
      overflow: hidden; 
      background: #111; 
    }
    .node-header {
      font-weight: bold;
      margin-bottom: 6px;
      color: #c026d3;
    }
  </style>
</head>
<body>

  <div id="toolbar">
    <h1 style="margin: 0 20px 0 0; font-size: 1.6rem;">Phantasm Role</h1>
    <button onclick="addNode('character')">+ Персонаж</button>
    <button onclick="addNode('event')">+ Событие</button>
    <button onclick="saveStory()">💾 Сохранить сюжет</button>
    <button onclick="loadStory()">📂 Загрузить сюжет</button>
    <button onclick="clearAll()" style="background:#991b1b;">Очистить всё</button>
  </div>

  <div id="canvas" class="canvas"></div>

  <script>
    let nodes = [];
    let lines = [];

    function addNode(type) {
      const node = document.createElement('div');
      node.className = 'node';
      node.style.left = (Math.random() * 500 + 150) + 'px';
      node.style.top = (Math.random() * 300 + 150) + 'px';

      if (type === 'character') {
        node.innerHTML = `
          <div class="node-header">👤 Персонаж</div>
          <input type="text" placeholder="Имя персонажа" value="Новый персонаж">
        `;
      } else {
        node.innerHTML = `
          <div class="node-header">📖 Событие</div>
          <textarea placeholder="Опишите событие..." rows="3">Новое событие</textarea>
        `;
      }

      node.onmousedown = dragStart;
      document.getElementById('canvas').appendChild(node);
      nodes.push(node);
    }

    // Перетаскивание нод
    let draggedNode = null;
    let offsetX, offsetY;

    function dragStart(e) {
      draggedNode = this;
      offsetX = e.clientX - this.getBoundingClientRect().left;
      offsetY = e.clientY - this.getBoundingClientRect().top;
      document.onmousemove = drag;
      document.onmouseup = stopDrag;
    }

    function drag(e) {
      if (!draggedNode) return;
      draggedNode.style.left = (e.clientX - offsetX) + 'px';
      draggedNode.style.top = (e.clientY - offsetY) + 'px';
    }

    function stopDrag() {
      document.onmousemove = null;
      document.onmouseup = null;
      draggedNode = null;
    }

    // Сохранение сюжета
    function saveStory() {
      const data = nodes.map(node => ({
        left: node.style.left,
        top: node.style.top,
        html: node.innerHTML,
        type: node.querySelector('input') ? 'character' : 'event'
      }));

      localStorage.setItem('phantasmStory', JSON.stringify(data));
      alert('✅ Сюжет успешно сохранён!');
    }

    // Загрузка сюжета
    function loadStory() {
      const saved = localStorage.getItem('phantasmStory');
      if (!saved) {
        alert('Нет сохранённых сюжетов');
        return;
      }

      const data = JSON.parse(saved);
      const canvas = document.getElementById('canvas');
      canvas.innerHTML = '';
      nodes = [];

      data.forEach(item => {
        const node = document.createElement('div');
        node.className = 'node';
        node.style.left = item.left;
        node.style.top = item.top;
        node.innerHTML = item.html;
        node.onmousedown = dragStart;
        canvas.appendChild(node);
        nodes.push(node);
      });

      alert('✅ Сюжет загружен!');
    }

    function clearAll() {
      if (confirm('Очистить весь сюжет?')) {
        document.getElementById('canvas').innerHTML = '';
        nodes = [];
        localStorage.removeItem('phantasmStory');
      }
    }

    // Инициализация
    window.onload = () => {
      // Если есть сохранённый сюжет — загружаем его
      if (localStorage.getItem('phantasmStory')) {
        loadStory();
      } else {
        // Добавляем примеры при первом запуске
        addNode('character');
        addNode('event');
      }
    };
  </script>
</body>
</html>
