<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phantasm Role — Создать анкету</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f0a1f, #1a0f2e); color: #e0d4ff; font-family: system-ui; }
    .glass { background: rgba(26, 17, 46, 0.92); backdrop-filter: blur(12px); border: 1px solid rgba(192, 38, 211, 0.3); }
  </style>
</head>
<body class="min-h-screen">

  <div class="max-w-2xl mx-auto py-10 px-6">
    <div class="glass rounded-3xl p-10">

      <h1 class="text-4xl font-bold text-center mb-10">Создать анкету</h1>

      <!-- 18+ -->
      <div class="mb-8 bg-red-900/30 border border-red-500/50 p-5 rounded-3xl">
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" id="adult" class="w-6 h-6 accent-pink-600">
          <span class="text-lg">Мне исполнилось 18 лет и я согласен(а) с NSFW-контентом</span>
        </label>
      </div>

      <!-- Пол -->
      <div class="mb-8">
        <h2 class="text-xl font-semibold mb-4">Пол персонажа</h2>
        <div class="grid grid-cols-3 gap-4">
          <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4">
            <input type="radio" name="gender" value="Парень" class="accent-pink-600"> <span>Парень</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4">
            <input type="radio" name="gender" value="Девушка" class="accent-pink-600"> <span>Девушка</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4">
            <input type="radio" name="gender" value="Скрыто" class="accent-pink-600"> <span>Скрыто</span>
          </label>
        </div>
      </div>

      <!-- Позиция -->
      <div class="mb-8">
        <h2 class="text-xl font-semibold mb-4">Позиция в сюжетах</h2>
        <div class="grid grid-cols-3 gap-4">
          <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4">
            <input type="radio" name="role" value="Актив" class="accent-pink-600"> <span>Актив</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4">
            <input type="radio" name="role" value="Пассив" class="accent-pink-600"> <span>Пассив</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4">
            <input type="radio" name="role" value="Уни" class="accent-pink-600"> <span>Уни</span>
          </label>
        </div>
      </div>

      <!-- Стиль -->
      <div class="mb-8">
        <h2 class="text-xl font-semibold mb-4">Стиль игры</h2>
        <div class="grid grid-cols-2 gap-4">
          <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4">
            <input type="radio" name="style" value="Литературный" class="accent-pink-600"> <span>Литературный стиль</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4">
            <input type="radio" name="style" value="Упрощенный" class="accent-pink-600"> <span>Упрощенный</span>
          </label>
        </div>
      </div>

      <!-- ГМ -->
      <div class="mb-8">
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" id="gm" class="w-5 h-5 accent-pink-600">
          <span class="text-lg">Я ГМ (Гейм Мастер)</span>
        </label>
      </div>

      <!-- Объём постов -->
      <div class="mb-8">
        <h2 class="text-xl font-semibold mb-4">Объём постов</h2>
        <div class="grid grid-cols-2 gap-4 text-sm">
          <div>
            <p class="mb-2 text-pink-300">ПК</p>
            <select id="volume_pc" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3">
              <option value="">Не указано</option>
              <option value="5+ ПК строк">5+ ПК строк</option>
              <option value="10+ ПК строк">10+ ПК строк</option>
              <option value="15+ ПК строк">15+ ПК строк</option>
            </select>
          </div>
          <div>
            <p class="mb-2 text-pink-300">Телефон</p>
            <select id="volume_phone" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3">
              <option value="">Не указано</option>
              <option value="10+ тел. строк">10+ тел. строк</option>
              <option value="15+ тел. строк">15+ тел. строк</option>
              <option value="20+ тел. строк">20+ тел. строк</option>
            </select>
          </div>
        </div>
      </div>

      <!-- О себе -->
      <div class="mb-10">
        <h2 class="text-2xl font-semibold mb-6">О себе и персонаже</h2>
        <textarea id="about" rows="5" placeholder="Внешность, опыт, характер..." 
                  class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5"></textarea>
      </div>

      <!-- Кого ищу (единый блок) -->
      <div class="mb-10">
        <h2 class="text-2xl font-semibold mb-6">Кого ищу</h2>
        
        <div class="mb-6">
          <p class="text-pink-300 mb-3">Позиция партнёра</p>
          <div class="grid grid-cols-3 gap-4">
            <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4">
              <input type="radio" name="seek_role" value="Актив" class="accent-pink-600"> <span>Актив</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4">
              <input type="radio" name="seek_role" value="Пассив" class="accent-pink-600"> <span>Пассив</span>
            </label>
            <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4">
              <input type="radio" name="seek_role" value="Уни" class="accent-pink-600"> <span>Уни</span>
            </label>
          </div>
        </div>

        <textarea id="search" rows="4" placeholder="Дополнительное описание кого ищу..." 
                  class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5"></textarea>

        <label class="flex items-center gap-3 cursor-pointer mt-4">
          <input type="checkbox" id="search_gm" class="w-5 h-5 accent-pink-600">
          <span class="text-lg">Ищу ГМ</span>
        </label>
      </div>

      <!-- Фетиши -->
      <div class="mb-10">
        <h2 class="text-2xl font-semibold mb-6">❤️‍🔥 Мои фетиши</h2>
        <div id="fetishes" class="space-y-8"></div>
      </div>

      <!-- Табу -->
      <div>
        <h2 class="text-2xl font-semibold mb-4">Табу</h2>
        <textarea id="tabu" rows="3" placeholder="Что точно не хочу..." 
                  class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5"></textarea>
      </div>

      <button onclick="submitForm()" 
              class="mt-12 w-full bg-gradient-to-r from-pink-600 to-purple-600 py-6 rounded-3xl text-2xl font-bold">
        Скопировать анкету
      </button>
    </div>
  </div>

  <!-- Модалка -->
  <div id="successModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="glass rounded-3xl p-10 max-w-md w-full text-center">
      <div class="text-6xl mb-6">✅</div>
      <h2 class="text-3xl font-bold mb-4">Анкета скопирована!</h2>
      <div class="bg-zinc-950 rounded-2xl p-6 text-left mb-8 max-h-96 overflow-auto">
        <pre id="copiedText" class="text-sm text-zinc-300 whitespace-pre-wrap"></pre>
      </div>
      <div class="flex gap-4">
        <button onclick="goToSuggested()" class="flex-1 py-5 bg-pink-600 rounded-2xl text-xl font-semibold">
          Перейти в предложенные
        </button>
        <button onclick="hideModal()" class="flex-1 py-5 bg-zinc-700 rounded-2xl text-xl font-semibold">
          Отредактировать
        </button>
      </div>
    </div>
  </div>

  <script>
    const fetishCategories = [ /* тот же список */ 
      {title: "Сеттинги", items: ["антиутопия","дикий_запад","историческое","киберпанк","постапокалипсис","современный_мир","стимпанк","темное_фэнтези","утопия","фантастика","фэнтези"]},
      {title: "Жанры", items: ["виртуальная_семья","война","выживание","гуро","детектив","драма","криминал","мистика","повседневность","приключение","реализм","романтика","ужас","экшн","юмор"]},
      {title: "Лёгкие фетиши", items: ["анал","бимбо","гарем","ддлг","игрушки","измена","классика","кремпай","куни","милфы","минет","обилие_жидкостей","пайзури","приятные_запахи","толстушки","футфетиш","черные"]},
      {title: "Фетиши", items: ["анилингус","бдсм","беременные","бондаж","буккаке","волосатость","блевотина","вомит","гипертрофия","глори_хол","грубость","групповой","грязь","деградация","жирные","животные","золотой_дождь","зд","игры_с_едой","изнасилование","инцест","контроль_оргазма","куколд","лактация","межрасовый","минимум_табу","лоли","молодые_девушки","шота","молодые_парни","монстрдевушки","монстры","неприятные_запахи","петплей","посторонние_предметы","принуждение","публичность","разница_в_возрасте","разница_в_размере","сексвайф","тентакли","удушье","унижение","фистинг","фемдом","феминизация","фурри","шибари"]},
      {title: "Хард фетиши", items: ["ампути","без_табу","бладплей","болбастинг","воре","копро","найфплей","насекомые","некро","нестандартные_отверстия","уретра","эрогуро"]}
    ];

    function renderFetishes() {
      const container = document.getElementById('fetishes');
      container.innerHTML = '';
      fetishCategories.forEach(cat => {
        const div = document.createElement('div');
        div.innerHTML = `
          <h3 class="text-pink-400 font-medium mb-3">${cat.title}</h3>
          <div class="grid grid-cols-2 gap-3">
            ${cat.items.map(item => `
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" value="${item}" class="w-5 h-5 accent-pink-600">
                <span>${item.replace(/_/g, ' ')}</span>
              </label>
            `).join('')}
          </div>`;
        container.appendChild(div);
      });
    }

    function generatePostText() {
      let text = 'Автор объявления достиг совершеннолетия\n\n';

      const gender = document.querySelector('input[name="gender"]:checked');
      if (gender) text += `Пол: #${gender.value}\n`;

      const role = document.querySelector('input[name="role"]:checked');
      if (role) text += `Позиция в сюжетах: #${role.value}\n`;

      const style = document.querySelector('input[name="style"]:checked');
      if (style) text += `Стиль игры: #${style.value.replace(' ', '_')}\n`;

      if (document.getElementById('gm').checked) text += `Ролю как: #ГМ\n`;

      const pc = document.getElementById('volume_pc').value;
      if (pc) text += `Объём постов (ПК): #${pc.replace(/ /g, '_')}\n`;

      const phone = document.getElementById('volume_phone').value;
      if (phone) text += `Объём постов (телефон): #${phone.replace(/ /g, '_')}\n`;

      const about = document.getElementById('about').value.trim();
      if (about) text += `\nО себе:\n${about}\n\n`;

      const seekRole = document.querySelector('input[name="seek_role"]:checked');
      if (seekRole) text += `Кого ищу (позиция): #${seekRole.value}\n\n`;

      const search = document.getElementById('search').value.trim();
      if (search) text += `Кого ищу:\n${search}\n\n`;

      if (document.getElementById('search_gm').checked) text += `#Ищу_ГМ\n\n`;

      const selected = Array.from(document.querySelectorAll('#fetishes input:checked')).map(cb => '#' + cb.value.replace(/\s+/g, '_'));
      if (selected.length) text += `Фетиши: ${selected.join(' ')}\n`;

      const tabu = document.getElementById('tabu').value.trim();
      if (tabu) text += `\nТабу: ${tabu}\n`;

      return text.trim();
    }

    function submitForm() {
      if (!document.getElementById('adult').checked) {
        alert('Подтверди совершеннолетие');
        return;
      }

      const text = generatePostText();
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById('copiedText').textContent = text;
        document.getElementById('successModal').classList.remove('hidden');
      }).catch(() => alert('Не удалось скопировать'));
    }

    function goToSuggested() {
      window.open('https://vk.com/wall-180485573?suggested=1', '_blank');
    }

    function hideModal() {
      document.getElementById('successModal').classList.add('hidden');
    }

    window.onload = () => {
      renderFetishes();
    };
  </script>
</body>
</html>
