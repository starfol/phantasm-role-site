<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phantasm Role — Создать анкету</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0f0a1f, #1a0f2e);
      color: #e0d4ff;
      font-family: system-ui, sans-serif;
    }
    .glass {
      background: rgba(26, 17, 46, 0.92);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(192, 38, 211, 0.25);
    }
  </style>
</head>
<body class="min-h-screen py-12">

  <div class="max-w-2xl mx-auto px-4">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold mb-2 text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-400">
        PHANTASM ROLE
      </h1>
      <p class="text-pink-300 text-xl">Создать NSFW-анкету</p>
    </div>

    <div class="glass rounded-3xl p-8 shadow-2xl">

      <!-- 18+ -->
      <div class="bg-red-900/30 border border-red-500/60 p-6 rounded-2xl mb-8 text-center">
        <label class="flex items-center justify-center gap-4 cursor-pointer text-lg">
          <input type="checkbox" id="adult" required class="w-6 h-6 accent-pink-600">
          <span class="font-medium">Мне исполнилось 18 лет и я согласен с NSFW-контентом</span>
        </label>
      </div>

      <!-- О себе -->
      <div class="mb-8">
        <h2 class="text-xl font-semibold mb-3 text-pink-300">📝 О себе и персонаже</h2>
        <textarea id="about" rows="6" placeholder="Внешность, характер, опыт, что нравится и не нравится..." 
                  class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-base resize-y"></textarea>
      </div>

      <!-- Пол и Позиция -->
      <div class="grid grid-cols-2 gap-6 mb-8">
        <div>
          <h2 class="text-xl font-semibold mb-3 text-pink-300">⚧ Пол</h2>
          <select id="gender" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
            <option value="">Выберите пол</option>
            <option value="Мужской">Мужской</option>
            <option value="Женский">Женский</option>
            <option value="Нон-байнари">Нон-байнари</option>
            <option value="Транс">Транс</option>
          </select>
        </div>
        <div>
          <h2 class="text-xl font-semibold mb-3 text-pink-300">🔥 Позиция в сюжетах</h2>
          <select id="role" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4">
            <option value="">Выберите позицию</option>
            <option value="Актив">Актив</option>
            <option value="Пассив">Пассив</option>
            <option value="Уни">Уни</option>
            <option value="Свитч">Свитч</option>
          </select>
        </div>
      </div>

      <!-- Что ищу -->
      <div class="mb-8">
        <h2 class="text-xl font-semibold mb-3 text-pink-300">🔍 Что ищу</h2>
        <textarea id="search" rows="3" placeholder="Возраст, формат, предпочтения, ограничения..." 
                  class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-4 text-base resize-y"></textarea>
      </div>

      <!-- Кого ищу -->
      <div class="mb-8">
        <h2 class="text-xl font-semibold mb-3 text-pink-300">👥 Кого ищу</h2>
        <div id="kogo" class="grid grid-cols-3 gap-3"></div>
      </div>

      <!-- Фетиши -->
      <div class="mb-8">
        <h2 class="text-xl font-semibold mb-4 text-pink-300">❤️‍🔥 Мои фетиши (ставь любые)</h2>
        <div id="fetishes" class="space-y-8"></div>
      </div>

      <!-- Долговременная игра -->
      <div class="mb-8">
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" id="longterm" class="w-5 h-5 accent-pink-600">
          <span class="text-lg">Готов(а) к долговременной игре</span>
        </label>
      </div>

      <button onclick="submitForm()" 
              class="w-full bg-gradient-to-r from-pink-600 via-purple-600 to-violet-600 py-6 rounded-3xl text-2xl font-bold hover:brightness-110 transition-all">
        Скопировать анкету
      </button>
    </div>
  </div>

  <!-- Success Modal -->
  <div id="successModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="glass rounded-3xl p-10 max-w-md w-full text-center">
      <div class="text-6xl mb-6">✅</div>
      <h2 class="text-3xl font-bold mb-4">Анкета скопирована</h2>
      <div class="bg-zinc-950 rounded-2xl p-6 text-left mb-8 max-h-96 overflow-auto">
        <pre id="copiedText" class="text-sm text-zinc-300 whitespace-pre-wrap"></pre>
      </div>
      <button onclick="location.reload()" class="w-full py-5 bg-pink-600 rounded-2xl text-xl font-semibold">
        Создать новую анкету
      </button>
    </div>
  </div>

  <script>
    // Фетиши (как на poiskrp + наши)
    const fetishCategories = [
      {title: "Базовые", items: ["Грязные разговоры", "Секстинг", "Голосовые", "Видео/фото", "Флирт", "Ролевые диалоги"]},
      {title: "BDSM", items: ["Доминирование", "Подчинение", "Бондаж", "Порка", "Унижение", "Ошейник", "Пет-плей", "Шибari"]},
      {title: "Фетиши тела", items: ["Фут-фетиш", "Ноги", "Колготки", "Лингери", "Латекс", "Косплей", "Тату"]},
      {title: "Секс", items: ["Оральный", "Анальный", "Игрушки", "Камшот", "Кремпай", "Сквирт", "Эджинг"]},
      {title: "Ролевки", items: ["Учитель/ученик", "Доктор/пациент", "Инцест-рольки", "CNC", "Много партнёров", "Публичный секс"]}
    ];

    function renderFetishes() {
      const container = document.getElementById('fetishes');
      fetishCategories.forEach(cat => {
        const div = document.createElement('div');
        div.innerHTML = `
          <h3 class="text-pink-400 font-medium mb-3">${cat.title}</h3>
          <div class="grid grid-cols-2 gap-3">
            ${cat.items.map(item => `
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" value="${item}" class="w-5 h-5 accent-pink-600">
                <span>${item}</span>
              </label>
            `).join('')}
          </div>`;
        container.appendChild(div);
      });
    }

    function renderKogo() {
      const list = ["Актив", "Пассив", "Уни", "Свитч"];
      const container = document.getElementById('kogo');
      list.forEach(item => {
        const div = document.createElement('div');
        div.className = "flex items-center gap-2";
        div.innerHTML = `<input type="checkbox" value="${item}" class="w-5 h-5 accent-pink-600"><span>${item}</span>`;
        container.appendChild(div);
      });
    }

    function generatePostText() {
      let text = 'Автор объявления достиг совершеннолетия\n\n';

      const about = document.getElementById('about').value.trim();
      if (about) text += `О себе:\n${about}\n\n`;

      if (document.getElementById('gender').value) text += `Пол: ${document.getElementById('gender').value}\n`;
      if (document.getElementById('role').value) text += `Позиция: ${document.getElementById('role').value}\n`;

      const search = document.getElementById('search').value.trim();
      if (search) text += `\nЧто ищу:\n${search}\n\n`;

      const kogo = Array.from(document.querySelectorAll('#kogo input:checked')).map(cb => cb.value);
      if (kogo.length) text += `Кого ищу: ${kogo.join(', ')}\n\n`;

      const fetishes = Array.from(document.querySelectorAll('#fetishes input:checked')).map(cb => '#' + cb.value.replace(/\s+/g, '_'));
      if (fetishes.length) text += `Фетиши: ${fetishes.join(' ')}\n`;

      if (document.getElementById('longterm').checked) text += `\nГотов(а) к долговременной игре\n`;

      return text.trim();
    }

    function submitForm() {
      if (!document.getElementById('adult').checked) {
        alert('Подтвердите совершеннолетие');
        return;
      }
      const text = generatePostText();
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById('copiedText').textContent = text;
        document.getElementById('successModal').classList.remove('hidden');
      });
    }

    window.onload = () => {
      renderFetishes();
      renderKogo();
    };
  </script>
</body>
</html>
