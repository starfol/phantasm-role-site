<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phantasm Role - Редактор сюжета</title>
  <style>
    body { 
      margin: 0; 
      font-family: system-ui; 
      background: #0a0a0a; 
      color: #fff; 
    }
    #toolbar { 
      padding: 15px; 
      background: #1a1a2e; 
      display: flex; 
      gap: 12px; 
      flex-wrap: wrap; 
      align-items: center;
      border-bottom: 1px solid #333;
    }
    button { 
      padding: 10px 18px; 
      background: #6b1b6b; 
      color: white; 
      border: none; 
      border-radius: 6px; 
      cursor: pointer; 
      font-size: 15px;
    }
    button:hover { background: #8b2b8b; }
    .timeline {
      display: flex;
      gap: 20px;
      padding: 30px;
      overflow-x: auto;
      min-height: calc(100vh - 70px);
      background: #111;
    }
    .tile {
      background: #1e1e2e;
      border: 2px solid #c026d3;
      border-radius: 10px;
      width: 240px;
      padding: 16px;
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }
    .tile-header {
      font-weight: bold;
      color: #c026d3;
      margin-bottom: 10px;
      font-size: 1.1rem;
    }
    .tile input, .tile textarea {
      width: 100%;
      background: #2a2a3a;
      border: 1px solid #555;
      color: #fff;
      padding: 8px;
      border-radius: 6px;
      margin-top: 8px;
    }
    .tile textarea { height: 100px; resize: vertical; }
    .delete-btn {
      margin-top: 10px;
      background: #991b1b;
      padding: 6px 12px;
      font-size: 13px;
    }
  </style>
</head>
<body>

  <div id="toolbar">
    <h1 style="margin: 0 20px 0 0;">Phantasm Role — Хронология сюжета</h1>
    <button onclick="addTile('character')">+ Персонаж</button>
    <button onclick="addTile('event')">+ Событие</button>
    <button onclick="saveStory()">💾 Сохранить</button>
    <button onclick="loadStory()">📂 Загрузить</button>
    <button onclick="clearAll()" style="background:#991b1b;">Очистить всё</button>
  </div>

  <div id="timeline" class="timeline"></div>

  <script>
    let tiles = [];

    function addTile(type) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      
      if (type === 'character') {
        tile.innerHTML = `
          <div class="tile-header">👤 Персонаж</div>
          <input type="text" placeholder="Имя персонажа" value="Новый персонаж">
        `;
      } else {
        tile.innerHTML = `
          <div class="tile-header">📖 Событие</div>
          <textarea placeholder="Описание события...">Новое событие</textarea>
        `;
      }

      tile.innerHTML += `<button class="delete-btn" onclick="deleteTile(this)">Удалить</button>`;
      document.getElementById('timeline').appendChild(tile);
      tiles.push(tile);
    }

    function deleteTile(btn) {
      const tile = btn.parentElement;
      tile.remove();
      tiles = tiles.filter(t => t !== tile);
    }

    function saveStory() {
      const data = tiles.map(tile => {
        const input = tile.querySelector('input');
        const textarea = tile.querySelector('textarea');
        return {
          type: input ? 'character' : 'event',
          value: input ? input.value : (textarea ? textarea.value : '')
        };
      });

      localStorage.setItem('phantasmTimeline', JSON.stringify(data));
      alert('✅ Хронология сюжета сохранена!');
    }

    function loadStory() {
      const saved = localStorage.getItem('phantasmTimeline');
      if (!saved) {
        alert('Нет сохранённых сюжетов');
        return;
      }

      const data = JSON.parse(saved);
      const timeline = document.getElementById('timeline');
      timeline.innerHTML = '';
      tiles = [];

      data.forEach(item => {
        const tile = document.createElement('div');
        tile.className = 'tile';

        if (item.type === 'character') {
          tile.innerHTML = `
            <div class="tile-header">👤 Персонаж</div>
            <input type="text" value="${item.value || 'Персонаж'}">
          `;
        } else {
          tile.innerHTML = `
            <div class="tile-header">📖 Событие</div>
            <textarea>${item.value || 'Событие'}</textarea>
          `;
        }

        tile.innerHTML += `<button class="delete-btn" onclick="deleteTile(this)">Удалить</button>`;
        timeline.appendChild(tile);
        tiles.push(tile);
      });

      alert('✅ Хронология загружена!');
    }

    function clearAll() {
      if (confirm('Очистить всю хронологию?')) {
        document.getElementById('timeline').innerHTML = '';
        tiles = [];
        localStorage.removeItem('phantasmTimeline');
      }
    }

    // Инициализация
    window.onload = () => {
      if (localStorage.getItem('phantasmTimeline')) {
        loadStory();
      } else {
        addTile('character');
        addTile('event');
      }
    };
  </script>
</body>
</html>
