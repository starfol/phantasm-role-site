<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phantasm Role — Создать анкету</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f0a1f, #1a0f2e); color: #e0d4ff; }
    .glass { background: rgba(26, 17, 46, 0.92); backdrop-filter: blur(12px); border: 1px solid rgba(192, 38, 211, 0.3); }
  </style>
</head>
<body class="min-h-screen">

  <div id="ageGate" class="min-h-screen flex items-center justify-center">
    <div class="text-center max-w-md px-6">
      <h1 class="text-6xl font-bold mb-6 bg-gradient-to-r from-pink-500 to-purple-500 bg-clip-text text-transparent">PHANTASM ROLE</h1>
      <p class="text-2xl mb-12 text-pink-200">Тёмный мир ролевых фантазий</p>
      <div onclick="confirmAge()" class="glass rounded-3xl p-12 cursor-pointer hover:scale-105 transition-transform border border-pink-500">
        <div class="text-7xl mb-6">🔞</div>
        <h2 class="text-3xl font-bold mb-4">Мне исполнилось 18 лет</h2>
        <p class="text-pink-300">Я понимаю, что здесь будет NSFW-контент</p>
      </div>
    </div>
  </div>

  <div id="mainForm" class="hidden max-w-2xl mx-auto py-10 px-6">
    <div class="glass rounded-3xl p-10">
      <h1 class="text-4xl font-bold text-center mb-10">Создать анкету</h1>

      <!-- Форма (сокращённая для надёжности) -->
      <div class="space-y-8">
        <div>
          <h2 class="text-xl font-semibold mb-4">Пол персонажа</h2>
          <div class="grid grid-cols-3 gap-4">
            <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4"><input type="radio" name="gender" value="Парень" class="accent-pink-600"><span>Парень</span></label>
            <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4"><input type="radio" name="gender" value="Девушка" class="accent-pink-600"><span>Девушка</span></label>
            <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4"><input type="radio" name="gender" value="Скрыто" class="accent-pink-600"><span>Скрыто</span></label>
          </div>
        </div>

        <div>
          <h2 class="text-xl font-semibold mb-4">Позиция в сюжетах</h2>
          <div class="grid grid-cols-3 gap-4">
            <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4"><input type="radio" name="role" value="Актив" class="accent-pink-600"><span>Актив</span></label>
            <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4"><input type="radio" name="role" value="Пассив" class="accent-pink-600"><span>Пассив</span></label>
            <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4"><input type="radio" name="role" value="Уни" class="accent-pink-600"><span>Уни</span></label>
          </div>
        </div>

        <div>
          <h2 class="text-xl font-semibold mb-4">Кого ищу (позиция)</h2>
          <div class="grid grid-cols-3 gap-4">
            <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4"><input type="radio" name="seek_role" value="Актив" class="accent-pink-600"><span>Актив</span></label>
            <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4"><input type="radio" name="seek_role" value="Пассив" class="accent-pink-600"><span>Пассив</span></label>
            <label class="flex items-center gap-3 cursor-pointer bg-zinc-900 border border-zinc-700 rounded-2xl p-4"><input type="radio" name="seek_role" value="Уни" class="accent-pink-600"><span>Уни</span></label>
          </div>
        </div>

        <textarea id="about" rows="4" placeholder="О себе..." class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5"></textarea>
        <textarea id="search" rows="4" placeholder="Кого ищу..." class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5"></textarea>

        <div id="fetishes"></div>

        <button onclick="submitForm()" class="w-full bg-gradient-to-r from-pink-600 to-purple-600 py-6 rounded-3xl text-2xl font-bold">
          Скопировать анкету
        </button>
      </div>
    </div>
  </div>

  <!-- Модалка -->
  <div id="successModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="glass rounded-3xl p-10 max-w-md w-full text-center">
      <div class="text-6xl mb-6">✅</div>
      <h2 class="text-3xl font-bold mb-4">Анкета скопирована!</h2>
      <div class="bg-zinc-950 rounded-2xl p-6 text-left mb-8 max-h-96 overflow-auto">
        <pre id="copiedText" class="text-sm text-zinc-300 whitespace-pre-wrap"></pre>
      </div>
      <div class="flex gap-4">
        <button onclick="goToSuggested()" class="flex-1 py-5 bg-pink-600 rounded-2xl text-xl font-semibold">Перейти в предложенные</button>
        <button onclick="hideModal()" class="flex-1 py-5 bg-zinc-700 rounded-2xl text-xl font-semibold">Отредактировать</button>
      </div>
    </div>
  </div>

  <script>
    function renderFetishes() {
      // Простая заглушка, чтобы не было ошибок
      document.getElementById('fetishes').innerHTML = '<p class="text-zinc-400">Фетиши (будут здесь)</p>';
    }

    function submitForm() {
      if (!document.getElementById('adult')) {
        const text = "Тестовая анкета\nАвтор объявления достиг совершеннолетия";
        navigator.clipboard.writeText(text).then(() => {
          document.getElementById('copiedText').textContent = text;
          document.getElementById('successModal').classList.remove('hidden');
        });
      }
    }

    function goToSuggested() { window.open('https://vk.com/wall-180485573?suggested=1', '_blank'); }
    function hideModal() { document.getElementById('successModal').classList.add('hidden'); }
    function confirmAge() {
      document.getElementById('ageGate').classList.add('hidden');
      document.getElementById('mainForm').classList.remove('hidden');
      renderFetishes();
    }

    window.onload = () => {};
  </script>
</body>
</html>
