<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phantasm Role</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: linear-gradient(135deg, #0f0a1f, #1a0f2e);
      color: #e0d4ff;
      font-family: system-ui, sans-serif;
    }
    .card {
      transition: all 0.3s ease;
    }
    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 40px rgba(192, 38, 211, 0.5);
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center">

  <!-- Входная страница 18+ -->
  <div id="ageGate" class="max-w-2xl mx-auto text-center px-6">
    <h1 class="text-6xl font-bold mb-4 bg-gradient-to-r from-pink-500 to-purple-500 bg-clip-text text-transparent">
      PHANTASM ROLE
    </h1>
    <p class="text-2xl mb-12 text-pink-200">Тёмный мир ролевых фантазий</p>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      <!-- Карточка 18+ -->
      <div onclick="confirmAge()" 
           class="card bg-gradient-to-br from-purple-900 to-pink-900 border border-pink-500 rounded-3xl p-10 cursor-pointer hover:border-pink-400">
        <div class="text-6xl mb-6">🔞</div>
        <h2 class="text-3xl font-bold mb-3">Мне 18+</h2>
        <p class="text-pink-200">Я совершеннолетний и готов к NSFW-контенту</p>
      </div>

      <!-- Карточка выхода -->
      <div onclick="exitSite()" 
           class="card bg-zinc-900 border border-zinc-700 rounded-3xl p-10 cursor-pointer hover:border-red-500">
        <div class="text-6xl mb-6">🚪</div>
        <h2 class="text-3xl font-bold mb-3 text-red-400">Мне меньше 18</h2>
        <p class="text-zinc-400">Выйти из сайта</p>
      </div>
    </div>

    <p class="text-xs text-zinc-500 mt-12">18+ | Только для взрослых</p>
  </div>

  <!-- Основная форма (скрыта изначально) -->
  <div id="mainForm" class="hidden max-w-md mx-auto min-h-screen p-6">
    <!-- Сюда вставим основную форму анкеты -->
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold">Создать анкету</h1>
    </div>
    <!-- Здесь будет твоя форма, которую мы делали раньше -->
    <!-- Я оставил место, чтобы потом вставить -->
    <div class="text-center text-zinc-400">
      <p>Форма анкеты будет здесь</p>
      <button onclick="backToAgeGate()" class="mt-8 text-pink-400">← Вернуться к подтверждению возраста</button>
    </div>
  </div>

  <script>
    function confirmAge() {
      document.getElementById('ageGate').classList.add('hidden');
      document.getElementById('mainForm').classList.remove('hidden');
    }

    function exitSite() {
      if (confirm("Вы действительно хотите покинуть сайт?")) {
        window.location.href = "https://www.google.com";
      }
    }

    function backToAgeGate() {
      document.getElementById('mainForm').classList.add('hidden');
      document.getElementById('ageGate').classList.remove('hidden');
    }
  </script>
</body>
</html>
