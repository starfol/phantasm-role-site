<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Phantasm Role</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: linear-gradient(135deg, #0f0a1f, #1a0f2e); color: #e0d4ff; font-family: system-ui; }
    .glass { background: rgba(26, 17, 46, 0.92); backdrop-filter: blur(12px); border: 1px solid rgba(192, 38, 211, 0.3); }
  </style>
</head>
<body class="min-h-screen">

  <!-- Страница 18+ -->
  <div id="ageGate" class="min-h-screen flex items-center justify-center">
    <div class="text-center max-w-md px-6">
      <h1 class="text-6xl font-bold mb-6 bg-gradient-to-r from-pink-500 to-purple-500 bg-clip-text text-transparent">
        PHANTASM ROLE
      </h1>
      <p class="text-2xl mb-12 text-pink-200">Тёмный мир ролевых фантазий</p>

      <div onclick="confirmAge()" class="glass rounded-3xl p-12 cursor-pointer hover:scale-105 transition-transform border border-pink-500">
        <div class="text-7xl mb-6">🔞</div>
        <h2 class="text-3xl font-bold mb-4">Мне исполнилось 18 лет</h2>
        <p class="text-pink-300">Я понимаю, что здесь будет NSFW-контент</p>
      </div>

      <p onclick="exitSite()" class="mt-10 text-zinc-500 hover:text-red-400 cursor-pointer">
        Мне меньше 18 — выйти
      </p>
    </div>
  </div>

  <!-- Основная форма -->
  <div id="mainForm" class="hidden max-w-2xl mx-auto py-10 px-6">

    <div class="glass rounded-3xl p-10">

      <h1 class="text-4xl font-bold text-center mb-10">Создать анкету</h1>

      <!-- === О СЕБЕ (первый блок) === -->
      <div class="mb-10">
        <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3"><span class="text-pink-400">📝</span> О себе и персонаже</h2>
        <textarea id="about" rows="6" placeholder="Внешность, опыт, характер, что нравится..." 
                  class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5 text-lg resize-y"></textarea>
      </div>

      <div class="grid grid-cols-2 gap-6 mb-10">
        <div>
          <h3 class="text-lg font-medium mb-3">Пол</h3>
          <select id="gender" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-4 text-lg">
            <option value="">Выберите</option>
            <option value="Мужской">Мужской</option>
            <option value="Женский">Женский</option>
            <option value="Нон-байнари">Нон-байнари</option>
            <option value="Транс">Транс</option>
          </select>
        </div>
        <div>
          <h3 class="text-lg font-medium mb-3">Позиция в сюжетах</h3>
          <select id="role" class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-4 text-lg">
            <option value="">Выберите</option>
            <option value="Актив">Актив</option>
            <option value="Пассив">Пассив</option>
            <option value="Уни">Уни</option>
          </select>
        </div>
      </div>

      <!-- Фетиши -->
      <div class="mb-12">
        <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3"><span class="text-pink-400">❤️‍🔥</span> Мои фетиши</h2>
        <div id="fetishes" class="space-y-8"></div>
      </div>

      <!-- === КОГО ИЩУ (второй блок) === -->
      <div>
        <h2 class="text-2xl font-semibold mb-6 flex items-center gap-3"><span class="text-pink-400">🔍</span> Кого ищу</h2>
        <textarea id="search" rows="5" placeholder="Возраст, роль, предпочтения, ограничения..." 
                  class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-6 py-5 text-lg resize-y"></textarea>
      </div>

      <button onclick="submitForm()" 
              class="mt-12 w-full bg-gradient-to-r from-pink-600 to-purple-600 py-6 rounded-3xl text-2xl font-bold">
        Скопировать анкету
      </button>
    </div>
  </div>

  <!-- Success Modal -->
  <div id="successModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="glass rounded-3xl p-10 max-w-md w-full text-center">
      <div class="text-6xl mb-6">✅</div>
      <h2 class="text-3xl font-bold mb-4">Анкета скопирована!</h2>
      <div class="bg-zinc-950 rounded-2xl p-6 text-left mb-8 max-h-96 overflow-auto">
        <pre id="copiedText" class="text-sm text-zinc-300 whitespace-pre-wrap"></pre>
      </div>
      <div class="flex gap-4">
        <button onclick="goToSuggested()" class="flex-1 py-5 bg-pink-600 rounded-2xl text-xl font-semibold">
          Перейти в предложенные
        </button>
        <button onclick="location.reload()" class="flex-1 py-5 bg-zinc-700 rounded-2xl text-xl font-semibold">
          Отредактировать
        </button>
      </div>
    </div>
  </div>

  <script>
    const fetishCategories = [
      {title: "Базовые разговорные", items: ["Грязные разговоры", "Секстинг", "Голосовые", "Видео/фото", "Флирт", "Намёки", "Ролевые диалоги"]},
      {title: "BDSM и власть", items: ["Доминирование", "Подчинение", "Бондаж", "Шибari", "Порка", "Воск", "Унижение", "Пет-плей", "Ошейник", "Плётка"]},
      {title: "Фетиши тела", items: ["Фут-фетиш", "Ноги", "Колготки/чулки", "Лингери", "Латекс", "Косплей", "Тату/пирсинг"]},
      {title: "Сексуальные практики", items: ["Оральный", "Анальный", "Игрушки", "Камшот", "Кремпай", "Сквирт", "Эджинг"]},
      {title: "Ролевые и табу", items: ["Учитель/ученик", "Доктор/пациент", "Инцест-рольки", "CNC", "Много партнёров", "Публичный секс"]}
    ];

    function renderFetishes() {
      const container = document.getElementById('fetishes');
      fetishCategories.forEach(cat => {
        const div = document.createElement('div');
        div.innerHTML = `
          <h3 class="text-pink-400 font-medium mb-3">${cat.title}</h3>
          <div class="grid grid-cols-2 gap-3">
            ${cat.items.map(item => `
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" value="${item}" class="w-5 h-5 accent-pink-600">
                <span>${item}</span>
              </label>
            `).join('')}
          </div>`;
        container.appendChild(div);
      });
    }

    function generatePostText() {
      let text = 'Автор объявления достиг совершеннолетия\n\n';

      const about = document.getElementById('about').value.trim();
      if (about) text += `О себе:\n${about}\n\n`;

      if (document.getElementById('gender').value) text += `Пол: ${document.getElementById('gender').value}\n`;
      if (document.getElementById('role').value) text += `Позиция в сюжетах: ${document.getElementById('role').value}\n`;

      const search = document.getElementById('search').value.trim();
      if (search) text += `\nКого ищу:\n${search}\n\n`;

      const selected = Array.from(document.querySelectorAll('#fetishes input:checked')).map(cb => '#' + cb.value.replace(/\s+/g, '_'));
      if (selected.length) text += `Фетиши: ${selected.join(' ')}\n`;

      return text.trim();
    }

    function submitForm() {
      if (!document.getElementById('adult').checked) {
        alert('Подтверди совершеннолетие');
        return;
      }
      const text = generatePostText();
      navigator.clipboard.writeText(text).then(() => {
        document.getElementById('copiedText').textContent = text;
        document.getElementById('successModal').classList.remove('hidden');
      });
    }

    function goToSuggested() {
      window.open('https://vk.com/wall-180485573?suggested=1', '_blank');
    }

    function confirmAge() {
      document.getElementById('ageGate').classList.add('hidden');
      document.getElementById('mainForm').classList.remove('hidden');
      renderFetishes();
    }

    function exitSite() {
      if (confirm("Выйти?")) window.location.href = "https://www.google.com";
    }

    window.onload = () => {};
  </script>
</body>
</html>
