<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NSFW Анкета • Phantasm Role</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; background: #0a0a0a; color: #fff; }
    .card { background: #1a1a2e; }
  </style>
</head>
<body class="min-h-screen">

  <div class="max-w-md mx-auto min-h-screen card shadow-2xl overflow-hidden">
    
    <div class="bg-gradient-to-r from-purple-600 via-pink-600 to-red-600 p-6 text-center">
      <h1 class="text-3xl font-bold">NSFW Анкета</h1>
      <p class="text-pink-200">Phantasm Role</p>
    </div>

    <div class="p-6 space-y-8">

      <!-- 18+ -->
      <div class="bg-red-900/30 border border-red-500/50 p-5 rounded-3xl">
        <label class="flex items-center gap-3 cursor-pointer">
          <input type="checkbox" id="adult" required class="w-6 h-6 accent-pink-600">
          <span class="text-lg">Мне исполнилось 18 лет и я согласен(а) с NSFW-контентом</span>
        </label>
      </div>

      <div>
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><span class="text-pink-500">📝</span> О себе и персонаже</h2>
        <textarea id="about" rows="5" placeholder="Внешность, опыт, характер, что нравится..." 
                  class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-5 py-4 text-lg resize-none"></textarea>
      </div>

      <div>
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><span class="text-pink-500">⚧</span> Пол</h2>
        <select id="gender" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-lg">
          <option value="">Выбери пол</option>
          <option value="Мужской">Мужской</option>
          <option value="Женский">Женский</option>
          <option value="Нон-байнари">Нон-байнари</option>
          <option value="Транс">Транс</option>
        </select>
      </div>

      <div>
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><span class="text-pink-500">🔥</span> Позиция в сюжетах</h2>
        <select id="role" class="w-full bg-zinc-900 border border-zinc-700 rounded-2xl px-5 py-3 text-lg">
          <option value="">Выбери позицию</option>
          <option value="Актив">Актив</option>
          <option value="Пассив">Пассив</option>
          <option value="Уни">Уни</option>
        </select>
      </div>

      <div>
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><span class="text-pink-500">🔍</span> Что ищу</h2>
        <textarea id="search" rows="3" placeholder="Что ищу в партнёре..." 
                  class="w-full bg-zinc-900 border border-zinc-700 rounded-3xl px-5 py-4 text-lg resize-none"></textarea>
      </div>

      <div>
        <h2 class="text-xl font-semibold mb-4 flex items-center gap-2"><span class="text-pink-500">👥</span> Кого ищу</h2>
        <div id="kogo" class="grid grid-cols-3 gap-3 text-sm"></div>
      </div>

      <details class="group">
        <summary class="text-xl font-semibold mb-4 flex items-center gap-2 cursor-pointer list-none">
          ❤️‍🔥 Мои фетиши (ставь любые — нажми чтобы открыть/закрыть)
          <span class="ml-auto text-pink-400 group-open:rotate-180 transition-transform">▼</span>
        </summary>
        <div id="fetishes" class="space-y-8 text-sm pl-2"></div>
      </details>

      <button onclick="submitForm()" 
              class="w-full bg-gradient-to-r from-pink-600 to-purple-600 py-5 rounded-3xl text-xl font-bold active:scale-95 transition-all">
        Скопировать анкету
      </button>
    </div>
  </div>

  <!-- Модалка -->
  <div id="successModal" class="hidden fixed inset-0 bg-black/90 flex items-center justify-center z-50">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-sm w-full text-center border border-pink-500">
      <div class="text-6xl mb-4">✅</div>
      <h2 class="text-2xl font-bold mb-2">Анкета скопирована!</h2>
      <p class="text-zinc-400 mb-6">Текст готов к вставке</p>

      <div class="bg-zinc-950 rounded-2xl p-4 text-left text-sm max-h-80 overflow-auto mb-6 border border-zinc-700">
        <pre id="copiedText" class="whitespace-pre-wrap text-zinc-300"></pre>
      </div>

      <button onclick="location.reload()" class="w-full bg-pink-600 py-4 rounded-3xl font-bold">
        Заполнить ещё одну
      </button>
    </div>
  </div>

  <script>
    const fetishCategories = [
      {title: "Базовые разговорные", items: ["Грязные разговоры", "Секстинг", "Голосовые", "Видео/фото", "Флирт", "Намёки", "Ролевые диалоги"]},
      {title: "BDSM и власть", items: ["Доминирование", "Подчинение", "Бондаж", "Шибari", "Порка", "Воск", "Унижение", "Пет-плей", "Ошейник", "Плётка"]},
      {title: "Фетиши тела", items: ["Фут-фетиш", "Ноги", "Колготки/чулки", "Лингери", "Латекс", "Косплей", "Тату/пирсинг"]},
      {title: "Сексуальные практики", items: ["Оральный", "Анальный", "Игрушки", "Камшот", "Кремпай", "Сквирт", "Эджинг"]},
      {title: "Ролевые и табу", items: ["Учитель/ученик", "Доктор/пациент", "Инцест-рольки", "CNC", "Много партнёров", "Публичный секс"]}
    ];

    function renderFetishes() {
      const container = document.getElementById('fetishes');
      fetishCategories.forEach(cat => {
        const div = document.createElement('div');
        div.innerHTML = `
          <h3 class="text-pink-400 font-medium mb-3">${cat.title}</h3>
          <div class="grid grid-cols-2 gap-3">
            ${cat.items.map(item => `
              <label class="flex items-center gap-2 cursor-pointer">
                <input type="checkbox" value="${item}" class="w-5 h-5 accent-pink-600">
                <span class="text-zinc-300">${item}</span>
              </label>
            `).join('')}
          </div>`;
        container.appendChild(div);
      });
    }

    function renderKogo() {
      const kogoList = ["Актив", "Пассив", "Уни"];
      const container = document.getElementById('kogo');
      kogoList.forEach(item => {
        const div = document.createElement('div');
        div.className = "flex items-center gap-2";
        div.innerHTML = `
          <input type="checkbox" value="${item}" class="w-5 h-5 accent-pink-600">
          <span class="text-zinc-300">${item}</span>
        `;
        container.appendChild(div);
      });
    }

    function generatePostText() {
      let text = 'Автор объявления достиг совершеннолетия\n\n';

      const about = document.getElementById('about').value.trim();
      if (about) text += `О себе:\n${about}\n\n`;

      if (document.getElementById('gender').value) text += `Пол: ${document.getElementById('gender').value}\n`;

      if (document.getElementById('role').value) text += `Позиция в сюжетах: ${document.getElementById('role').value}\n`;

      const search = document.getElementById('search').value.trim();
      if (search) text += `\nЧто ищу:\n${search}\n\n`;

      const kogoSelected = Array.from(document.querySelectorAll('#kogo input:checked')).map(cb => cb.value);
      if (kogoSelected.length) text += `Кого ищу: ${kogoSelected.join(', ')}\n\n`;

      const selectedFetishes = Array.from(document.querySelectorAll('#fetishes input:checked')).map(cb => {
        return '#' + cb.value.replace(/\s+/g, '_');
      });

      if (selectedFetishes.length) {
        text += `Фетиши: ${selectedFetishes.join(' ')}\n`;
      }

      return text.trim();
    }

    async function submitForm() {
      if (!document.getElementById('adult').checked) {
        alert('✅ Подтверди, что тебе 18+');
        return;
      }

      const text = generatePostText();
      
      try {
        await navigator.clipboard.writeText(text);
        document.getElementById('copiedText').textContent = text;
        document.getElementById('successModal').classList.remove('hidden');
      } catch (e) {
        alert('Не удалось скопировать. Попробуй в Chrome.');
      }
    }

    window.onload = () => {
      renderFetishes();
      renderKogo();
    };
  </script>
</body>
</html>
